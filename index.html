<!DOCTYPE html>
<html>
<head>
<title>For Srushti 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  overflow:hidden;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  width:90%;
  max-width:350px;
  text-align:center;
}

h2, p { 
  color: #1a1a1a; 
}

button {
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

button:hover {
  transform: scale(1.1);
}

#noBtn {
  background: #ffffffcc;
  color: #333;
  border: 1px solid #ccc;
}
#message {
  color:#222;
  font-weight:500;
}
button:first-of-type {
  background: linear-gradient(135deg,#ff6a88,#ff99ac);
  color:white;
}

.heart {
  position:absolute;
  font-size:18px;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(0); opacity:1;}
  to {transform: translateY(-100vh); opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<div id="step1">
  <h2>Srushti… ek vaat kevi che </h2>
  <h2>gusso no krti please , last time only</h2>
  <button onclick="start()">Click kari de aiya</button>
</div>

<div id="step2" style="display:none;">
  <h2>💙</h2>
  <p id="message"></p>
</div>

<div id="step3" style="display:none;">
  <h2>So… Sunday? Pliizzz 🥺</h2>
  <button onclick="yesClick()">Haa aavis hve chup re</button>
  <button id="noBtn" onclick="noClick()">chup re</button>
  <p id="response"></p>
</div>

</div>

<script>

// ===== CONFIG =====
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSehcSSlNop-yqb6fRWkgcs0qmwoanQ9T1_2dNlIw9_Yv-vWSg/formResponse";
const ENTRY_ID = "entry.366349824";

const BOT_TOKEN = "8625410960:AAGectZnI8pwIOAgtsYKpL33guNb3Aal__U";
const CHAT_ID = "5430041200";

// ===== TELEGRAM =====
function sendTelegram(msg){
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: msg
    })
  });
}

// ===== TRACK =====
function track(value){
  fetch(FORM_URL, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body: ENTRY_ID + "=" + value
  });

  sendTelegram("Srushti clicked: " + value + " at " + new Date().toLocaleTimeString());
}

// ===== HEARTS =====
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },500);
}

// ===== MESSAGE =====
const text = `Srushti… sachu kv neto…  

mne tari sathe time spend karvu kharekhar game che 🫶🏻

Svare jagu tyare pela vichar taro aave che…  
ane rate suv tyare to tane khabar j che… tari hare vaat kari ne j suv chu 😊  

Khabar nathi kem… pan tu hoy ne to badhu mstt lage che…  

Plizzz plizzz rikvestt Srushtii…  
aa Sunday I really really want ke tari sathe time spend karu…  

Please na no padti… ❤️`;

let i=0;

// ===== START =====
function start(){
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
  hearts();
  type();
}

// ===== TYPE =====
function type(){
  if(i<text.length){
    document.getElementById("message").innerHTML+=text[i];
    i++;
    setTimeout(type,30);
  } else {
    setTimeout(()=>{
      document.getElementById("step3").style.display="block";
    },500);
  }
}

// ===== YES =====
function yesClick(){
  track("YES ❤️");
  document.getElementById("response").innerHTML =
  "Yayyy Thank youuuu srushtuudi 😍💙 Sunday fix ✨";
}

// ===== NO =====
let moves=0;

function noClick(){
  track("NO click 😜");

  if(moves<3){
    let btn=document.getElementById("noBtn");
    btn.style.position="absolute";
    btn.style.top=Math.random()*70+"%";
    btn.style.left=Math.random()*70+"%";
    moves++;
  } else {
    track("FINAL NO 😭");

    document.getElementById("response").innerHTML =
    `Tu chup karay de mne 🥲 Atyare sudhi to chup hto 🙁  
hve hu kv chu to plijjj my babyy gurll aavne… maja aavshe sathe 💙`;
  }
}

</script>

</body>
</html>
